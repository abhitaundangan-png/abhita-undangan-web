<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Tamu RSVP | Abhita Undangan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { brand: { dark:'#1e2d24', sage:'#4A7c59', cream:'#fbf9f6', gold:'#C5A880', pink:'#D9A0A0' } },
                fontFamily: { serif:['Playfair Display','serif'], sans:['Plus Jakarta Sans','sans-serif'] }
            }}
        }
    </script>
    <style>
        body { background:#f4f6f4; font-family:'Plus Jakarta Sans',sans-serif; }
        .tab-btn.active { background:#4A7c59; color:#fff; box-shadow:0 4px 14px rgba(74,124,89,0.3); }
        .tab-panel { display:none; }
        .tab-panel.active { display:block; }
        .badge-hadir { background:#dcfce7; color:#166534; }
        .badge-tidak { background:#fee2e2; color:#991b1b; }
        .empty-state { text-align:center; padding:4rem 1rem; color:#9ca3af; }
    </style>
</head>
<body class="min-h-screen antialiased pb-10">

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-brand-sage/10 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-3.5 flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
                <a href="../index.html" class="w-9 h-9 rounded-xl bg-brand-cream border border-brand-sage/20 flex items-center justify-center text-brand-sage hover:bg-brand-sage hover:text-white transition text-sm">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div>
                    <p class="font-serif font-bold text-brand-dark text-base leading-tight">Buku Tamu RSVP</p>
                    <p class="text-xs text-brand-sage font-semibold">Abhita Undangan</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="refreshAll()" class="w-9 h-9 rounded-xl border border-brand-sage/20 flex items-center justify-center text-brand-sage hover:bg-brand-sage/10 transition text-sm" title="Refresh">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
                <button onclick="exportCurrentCSV()" class="bg-brand-sage text-white text-xs font-bold px-4 py-2.5 rounded-full hover:bg-brand-dark transition shadow-sm flex items-center gap-1.5">
                    <i class="fa-solid fa-file-csv"></i> Export CSV
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-5xl mx-auto px-4 pt-6">

        <!-- Summary Stats Cards -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6" id="stats-row">
            <!-- Diisi oleh JS -->
        </div>

        <!-- Tab Navigation -->
        <div class="flex gap-2 mb-5">
            <button onclick="switchTab('semua')" id="tab-btn-semua" class="tab-btn active px-5 py-2.5 rounded-xl text-sm font-bold text-brand-sage bg-white border border-brand-sage/20 flex items-center gap-1.5 flex-shrink-0">
                <i class="fa-solid fa-list-ul"></i> Semua Undangan
            </button>
            <button onclick="switchTab('green')" id="tab-btn-green" class="tab-btn px-5 py-2.5 rounded-xl text-sm font-bold text-brand-sage bg-white border border-brand-sage/20 flex items-center gap-1.5 flex-shrink-0">
                <i class="fa-solid fa-leaf"></i> Green
            </button>
            <button onclick="switchTab('flora-pink')" id="tab-btn-flora-pink" class="tab-btn px-5 py-2.5 rounded-xl text-sm font-bold text-brand-sage bg-white border border-brand-sage/20 flex items-center gap-1.5 flex-shrink-0">
                <i class="fa-solid fa-heart"></i> Flora Pink
            </button>
        </div>

        <!-- Search Bar -->
        <div class="relative mb-5">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                <i class="fa-solid fa-magnifying-glass text-sm"></i>
            </div>
            <input type="text" id="search-input" oninput="applySearch()" placeholder="Cari nama tamu atau pesan..."
                class="w-full pl-10 pr-4 py-3 bg-white border border-brand-sage/15 rounded-xl focus:outline-none focus:border-brand-sage text-sm transition">
        </div>

        <!-- Tab Panels -->
        <div id="panel-semua" class="tab-panel active"></div>
        <div id="panel-green" class="tab-panel"></div>
        <div id="panel-flora-pink" class="tab-panel"></div>

    </div>

    <!-- Delete Confirm Modal -->
    <div id="modal-hapus" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center px-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full text-center shadow-2xl">
            <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500 text-2xl">
                <i class="fa-solid fa-trash-can"></i>
            </div>
            <h3 class="font-bold text-brand-dark text-lg mb-2">Hapus Semua Data?</h3>
            <p class="text-gray-500 text-sm mb-6" id="modal-hapus-desc">Semua data tamu akan dihapus permanen.</p>
            <div class="flex gap-3">
                <button onclick="closeHapusModal()" class="flex-1 py-3 border-2 border-gray-200 text-gray-600 font-bold rounded-xl hover:border-gray-300 transition text-sm">Batal</button>
                <button onclick="confirmHapus()" class="flex-1 py-3 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 transition text-sm">Hapus</button>
            </div>
        </div>
    </div>

    <script>
    // ================================================================
    // DATA CONFIGURATION
    // ================================================================
    const TEMA_LIST = [
        { id: 'green', label: 'Green (Sage & Gold)', tamuKey: 'tamu_green', adminPath: '../admin.html?tema=green', color: '#4A7c59' },
        { id: 'flora-pink', label: 'Flora Pink', tamuKey: 'tamu_flora-pink', adminPath: '../admin.html?tema=flora-pink', color: '#D9A0A0' }
    ];

    let allData = {}; // { 'green': [...], 'flora-pink': [...] }
    let currentTab = 'semua';
    let deleteTarget = null; // 'green' | 'flora-pink' | 'all'

    // ================================================================
    // INIT
    // ================================================================
    document.addEventListener('DOMContentLoaded', () => {
        loadAllData();
        renderAll();
    });

    function loadAllData() {
        TEMA_LIST.forEach(tema => {
            try {
                const stored = localStorage.getItem(tema.tamuKey);
                allData[tema.id] = stored ? JSON.parse(stored) : [];
            } catch(e) {
                allData[tema.id] = [];
            }
        });
    }

    function refreshAll() {
        loadAllData();
        renderAll();
        showToast('Data diperbarui!');
    }

    // ================================================================
    // RENDER
    // ================================================================
    function renderAll() {
        renderStats();
        renderPanel('semua');
        renderPanel('green');
        renderPanel('flora-pink');
    }

    function renderStats() {
        const allGuests = [...(allData['green']||[]), ...(allData['flora-pink']||[])];
        const totalHadir = allGuests.filter(w => w.attendance === 'Hadir').length;
        const totalTidak = allGuests.filter(w => w.attendance !== 'Hadir').length;

        document.getElementById('stats-row').innerHTML = `
            <div class="bg-white rounded-2xl p-5 border border-brand-sage/10 shadow-sm flex flex-col gap-1">
                <p class="text-2xl font-serif font-bold text-brand-dark">${allGuests.length}</p>
                <p class="text-xs text-gray-500 font-medium">Total Tamu</p>
            </div>
            <div class="bg-white rounded-2xl p-5 border border-green-100 shadow-sm flex flex-col gap-1">
                <p class="text-2xl font-serif font-bold text-green-600">${totalHadir}</p>
                <p class="text-xs text-gray-500 font-medium">Hadir</p>
            </div>
            <div class="bg-white rounded-2xl p-5 border border-red-100 shadow-sm flex flex-col gap-1">
                <p class="text-2xl font-serif font-bold text-red-500">${totalTidak}</p>
                <p class="text-xs text-gray-500 font-medium">Tidak Hadir</p>
            </div>
            <div class="bg-white rounded-2xl p-5 border border-brand-sage/10 shadow-sm flex flex-col gap-1">
                <p class="text-2xl font-serif font-bold text-brand-sage">${(allData['green']||[]).length + ' / ' + (allData['flora-pink']||[]).length}</p>
                <p class="text-xs text-gray-500 font-medium">Green / Pink</p>
            </div>
        `;
    }

    function getFilteredGuests(temaId) {
        const query = (document.getElementById('search-input')?.value || '').toLowerCase().trim();
        let guests = [];
        if (temaId === 'semua') {
            TEMA_LIST.forEach(t => {
                (allData[t.id] || []).forEach(g => guests.push({ ...g, _tema: t.id, _temaLabel: t.label }));
            });
        } else {
            (allData[temaId] || []).forEach(g => guests.push({ ...g, _tema: temaId }));
        }
        if (query) {
            guests = guests.filter(g => 
                (g.name || '').toLowerCase().includes(query) ||
                (g.message || '').toLowerCase().includes(query)
            );
        }
        return guests.sort((a, b) => {
            // Support dua format: timestamp (number) dan date (string dari Green)
            const ta = b.timestamp || (b.date ? new Date(b.date.replace(/\./g,'/')).getTime() : 0) || b.id || 0;
            const tb = a.timestamp || (a.date ? new Date(a.date.replace(/\./g,'/')).getTime() : 0) || a.id || 0;
            return ta - tb;
        });
    }

    function renderPanel(panelId) {
        const panel = document.getElementById('panel-' + panelId);
        if (!panel) return;
        const guests = getFilteredGuests(panelId);
        const tema = TEMA_LIST.find(t => t.id === panelId);

        let headerHTML = '';
        if (panelId === 'semua') {
            headerHTML = `
                <div class="flex items-center justify-between mb-4">
                    <h2 class="font-serif text-lg font-bold text-brand-dark">Semua Tamu Undangan <span class="text-brand-sage">(${guests.length})</span></h2>
                    <button onclick="showHapusModal('all')" class="text-xs text-red-400 hover:text-red-600 font-bold flex items-center gap-1 transition">
                        <i class="fa-solid fa-trash"></i> Hapus Semua
                    </button>
                </div>`;
        } else {
            headerHTML = `
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <h2 class="font-serif text-lg font-bold text-brand-dark">${tema?.label} <span class="text-brand-sage">(${guests.length})</span></h2>
                        <div class="flex items-center gap-3 mt-1">
                            <span class="text-xs text-green-600 font-semibold">${guests.filter(g=>g.attendance==='Hadir').length} Hadir</span>
                            <span class="text-xs text-red-500 font-semibold">${guests.filter(g=>g.attendance!=='Hadir').length} Tidak Hadir</span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <a href="${tema?.adminPath}" class="text-xs text-brand-sage font-bold flex items-center gap-1 px-3 py-1.5 bg-brand-sage/10 rounded-lg hover:bg-brand-sage/20 transition">
                            <i class="fa-solid fa-pen"></i> Edit
                        </a>
                        <button onclick="showHapusModal('${panelId}')" class="text-xs text-red-400 hover:text-red-600 font-bold flex items-center gap-1 px-3 py-1.5 bg-red-50 rounded-lg hover:bg-red-100 transition">
                            <i class="fa-solid fa-trash"></i> Hapus
                        </button>
                    </div>
                </div>`;
        }

        if (guests.length === 0) {
            panel.innerHTML = headerHTML + `
                <div class="empty-state bg-white rounded-2xl border border-brand-sage/10">
                    <i class="fa-regular fa-comment-dots text-4xl block mb-3 opacity-40"></i>
                    <p class="font-bold text-gray-400 text-sm">Belum ada ucapan</p>
                    <p class="text-xs text-gray-300 mt-1">Tamu yang mengisi form RSVP akan tampil di sini.</p>
                </div>`;
            return;
        }

        const rows = guests.map((g, i) => {
            const isHadir = g.attendance === 'Hadir';
            // Support format timestamp (number) ATAU date (string dari Green theme)
            let timeStr = '-';
            if (g.timestamp) {
                timeStr = new Date(g.timestamp).toLocaleString('id-ID', { dateStyle:'short', timeStyle:'short' });
            } else if (g.date) {
                timeStr = g.date; // sudah dalam format string yang bisa dibaca
            }
            const temaLabel = g._temaLabel ? `<span class="text-[9px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">${g._temaLabel}</span>` : '';
            return `
                <div class="bg-white rounded-2xl p-4 sm:p-5 border border-brand-sage/8 shadow-sm hover:shadow-md transition">
                    <div class="flex items-start justify-between gap-3 mb-2">
                        <div class="flex items-center gap-2 flex-wrap">
                            <p class="font-bold text-brand-dark text-sm">${escapeHTML(g.name || '-')}</p>
                            ${temaLabel}
                        </div>
                        <div class="flex items-center gap-2 flex-shrink-0">
                            <span class="text-[10px] font-bold px-2.5 py-1 rounded-full ${isHadir ? 'badge-hadir' : 'badge-tidak'}">
                                ${isHadir ? '<i class="fa-solid fa-check mr-1"></i>Hadir' : '<i class="fa-solid fa-xmark mr-1"></i>Tidak Hadir'}
                            </span>
                        </div>
                    </div>
                    <p class="text-sm text-gray-600 leading-relaxed mb-2">${escapeHTML(g.message || '-')}</p>
                    <p class="text-xs text-gray-400"><i class="fa-regular fa-clock mr-1"></i>${timeStr}</p>
                </div>`;
        }).join('');

        panel.innerHTML = headerHTML + `<div class="space-y-3">${rows}</div>`;
    }

    function applySearch() {
        renderPanel(currentTab);
        if (currentTab !== 'semua') renderPanel('semua');
    }

    function escapeHTML(str) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    // ================================================================
    // TABS
    // ================================================================
    function switchTab(tabId) {
        currentTab = tabId;
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-' + tabId).classList.add('active');
        document.getElementById('tab-btn-' + tabId).classList.add('active');
    }

    // ================================================================
    // DELETE
    // ================================================================
    function showHapusModal(target) {
        deleteTarget = target;
        const desc = target === 'all'
            ? 'Semua data tamu dari semua undangan akan dihapus permanen dan tidak bisa dikembalikan.'
            : `Semua data tamu undangan <strong>${TEMA_LIST.find(t=>t.id===target)?.label}</strong> akan dihapus permanen.`;
        document.getElementById('modal-hapus-desc').innerHTML = desc;
        document.getElementById('modal-hapus').classList.remove('hidden');
        document.getElementById('modal-hapus').classList.add('flex');
    }

    function closeHapusModal() {
        document.getElementById('modal-hapus').classList.add('hidden');
        document.getElementById('modal-hapus').classList.remove('flex');
        deleteTarget = null;
    }

    function confirmHapus() {
        if (!deleteTarget) return;
        if (deleteTarget === 'all') {
            TEMA_LIST.forEach(t => {
                localStorage.removeItem(t.tamuKey);
                allData[t.id] = [];
            });
        } else {
            const tema = TEMA_LIST.find(t => t.id === deleteTarget);
            if (tema) { localStorage.removeItem(tema.tamuKey); allData[tema.id] = []; }
        }
        closeHapusModal();
        renderAll();
        showToast('Data berhasil dihapus.');
    }

    // ================================================================
    // EXPORT CSV
    // ================================================================
    function exportCurrentCSV() {
        const tabToExport = currentTab;
        const guests = getFilteredGuests(tabToExport);
        if (guests.length === 0) { alert('Tidak ada data untuk diexport.'); return; }

        const headers = ['No', 'Nama', 'Kehadiran', 'Pesan', 'Waktu', 'Tema'];
        const rows = guests.map((g, i) => {
            let timeStr = '-';
            if (g.timestamp) {
                timeStr = new Date(g.timestamp).toLocaleString('id-ID');
            } else if (g.date) {
                timeStr = g.date;
            }
            const temaLabel = g._temaLabel || TEMA_LIST.find(t=>t.id===tabToExport)?.label || '-';
            return [i+1, g.name||'', g.attendance||'', (g.message||'').replace(/"/g,"'"), timeStr, temaLabel];
        });

        const csvContent = [headers, ...rows].map(row => row.map(v => `"${v}"`).join(',')).join('\n');
        const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `buku-tamu-${tabToExport}-${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('File CSV berhasil didownload!');
    }

    // ================================================================
    // TOAST
    // ================================================================
    let toastTimeout;
    function showToast(msg) {
        let toast = document.getElementById('tamu-toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'tamu-toast';
            toast.style.cssText = 'position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#4A7c59;color:#fff;padding:.75rem 1.75rem;border-radius:99px;font-size:.85rem;font-weight:600;z-index:999;box-shadow:0 8px 24px rgba(74,124,89,.4);transition:opacity .3s;';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.opacity = '1';
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => { toast.style.opacity = '0'; }, 3000);
    }
    </script>

</body>
</html>
